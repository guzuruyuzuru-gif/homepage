<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>homepage</title>
  </head>

  <body>
<!-- Swiper -->
<div id="swiper-container">
        <div>
            <!-- Slider main container -->
            <!-- 複数のSwiperを識別するため、 classに swiper-1 を設定-->
            <div class="swiper swiper-1">
                <!-- Additional required wrapper -->
                <div class="swiper-wrapper">
                    <!-- Slides -->
                    <div class="swiper-slide">Slide 1</div>
                    <div class="swiper-slide">Slide 2</div>
                    <div class="swiper-slide">Slide 3</div>
                    <div class="swiper-slide">Slide 4</div>
                </div>
                <!-- If we need pagination -->
                <div class="swiper-pagination"></div>
            
                <!-- If we need navigation buttons -->
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
            
                <!-- If we need scrollbar -->
                <!-- <div class="swiper-scrollbar swiper-scrollbar-1"></div> -->
            </div>
            <!-- タイトル表示用 -->
            <div id="swiper-title" class="swiper-title"></div>
        </div>

        <div>
            <!-- Slider main container -->
            <!-- 複数のSwiperを識別するため、 classに swiper-2 を設定-->
            <div class="swiper swiper-2">
                <!-- Additional required wrapper -->
                <div class="swiper-wrapper">
                    <!-- Slides -->
                    <div class="swiper-slide">
                        <div>
                            <img src="/img/pose_pien_uruuru_man.png" alt="">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div>
                            <img src="/img/pose_dance_ukareru_woman.png" alt="">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div>
                            <img src="/img/pose_koshi_nukeru_kowai_woman.png" alt="">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div>
                            <img src="/img/pose_kuyashii_man.png" alt="">
                        </div>
                    </div>
                </div>
                <!-- If we need pagination -->
                <div class="swiper-pagination"></div>
            
                <!-- If we need navigation buttons -->
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
            
                <!-- If we need scrollbar -->
                <div class="swiper-scrollbar"></div>
            </div>
            <!-- タイトル表示用 -->
            <div id="swiper-title-2" class="swiper-title"></div>
        </div>
        </div>

    </div>

    <form id="basic_form">
      <div class="form-row">
      <label for="basic_name">名前</label>

      <div class="input-wrapper">
      <input
        id="basic_name"
        name="name"
        type="text"
        placeholder="名前を入力してください"
      />
</div>
</div>

<div class="form-row">
<label for="basic_email">メール</label>

<div class="input-wrapper">
      <input
        id="basic_email"
        name="email"
        type="text"
        placeholder="メールアドレスを入力してください"
      />
</div>
</div>

<div class="form-row">
      <label for="basic_password">パスワード</label>

      <div class="input-wrapper">
      <input
        id="basic_password"
        name="password"
        type="text"
        placeholder="パスワードを入力してください"
      />
</div>
</div>

      <div class="form-row">
      <label for="basic_age">年齢</label>

      <div class="input-wrapper">
      <input
        id="basic_age"
        name="age"
        type="text"
        placeholder="年齢を入力してください"
      />
</div>
</div>

      <div class="form-row">
      <label for="basic_address">住所</label>

      <div class="input-wrapper">
      <input
        id="basic_address"
        name="address"
        type="text"
        placeholder="住所を入力してください"
      />
</div>
</div>

<div class="button-area">
      <button type="submit">送信</button>
</div>

    </form>

    <script type="module" src="/src/main.js"></script>
  </body>

</html>
